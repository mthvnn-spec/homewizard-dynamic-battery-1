# ============================================================
#  Tibber + HomeWizard Battery — Hybrid YAML + Pyscript  v25
#  ──────────────────────────────────────────────────────────
#  Changes vs v24:
#    - Opportunistic charging now requires a profitable DP schedule
#      (no longer charges blindly at cheap prices with no sell path)
#    - Solar headroom disabled while saldering/netting is active;
#      only activates when saldering is off or tomorrow has neg prices
#    - Terminal-value DP replaces fixed margin_penalty per discharge
#    - Profit tracking is saldering-aware: solar opportunity cost uses
#      retail price when saldering=on, export_value when saldering=off
#    - Added battery_export_value_per_kwh helper (default 0.09 EUR/kWh)
#    - Solar forecast accuracy ratio corrects tomorrow's headroom calc
#    - DP charge cost now uses grid-side kWh (/ charge_efficiency)
#    - min_price_spread now enforced in profitability check
#
#  Pyscript: /config/pyscript/battery_scheduler.py
# ============================================================

