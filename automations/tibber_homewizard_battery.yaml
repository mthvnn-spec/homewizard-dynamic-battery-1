  # Rolling estimate of average home consumption (W).
  # HomeWizard 'zero' mode is load-following: the battery never exports,
  # so real per-slot discharge is capped by home consumption, not the
  # 800 W rated rate. This helper is auto-updated by an EMA of
  # sensor.p1_meter_power whenever the battery is idle. The DP uses it
  # to derive the effective discharge rate for scheduling.
  battery_avg_home_load_w:
