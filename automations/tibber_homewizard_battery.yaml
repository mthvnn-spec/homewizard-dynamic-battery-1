  # Charges from grid when live price <= this threshold, but only when
  # the overall DP schedule is already profitable. Prevents filling the
  # battery at cheap prices that still have no good discharge path.
  # Set to 0 to disable. Default 0.14 = 14 ct/kWh.
  battery_opportunistic_charge_threshold:
    name: "Battery Opportunistic Charge Threshold"
